# DB Monitor Agent — default configuration
# All values can be overridden via system properties (-Ddbmonitor.<key>=<value>)
# or by supplying a custom properties file path as the agent argument.

# Master switch: set to false to disable all instrumentation at startup
dbmonitor.enabled=true

# Logical name of the monitored application (appears in all emitted events)
dbmonitor.appName=unknown-app

# Deployment environment label (e.g. dev, staging, prod)
dbmonitor.environment=dev

# HTTP endpoint of the collector service that receives event payloads
dbmonitor.collectorEndpoint=http://localhost:8080/api/events

# How often (ms) the background reporter flushes the event queue to the collector
dbmonitor.reportingIntervalMs=5000

# Queries whose execution time exceeds this threshold (ms) are flagged as slow
dbmonitor.slowQueryThresholdMs=1000

# SQL capture mode: FULL (capture entire SQL text) | TRUNCATED | NONE
dbmonitor.sqlCapture=FULL

# Maximum number of events held in the in-memory queue before oldest are dropped
dbmonitor.maxQueueSize=1000

# Number of HTTP retry attempts when the collector endpoint is unreachable
dbmonitor.retryAttempts=2

# Base delay (ms) between consecutive retry attempts (exponential back-off multiplier is 2x)
dbmonitor.retryDelayMs=500
