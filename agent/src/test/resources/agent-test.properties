# DB Monitor Agent — test configuration
# Overrides agent-default.properties for unit and integration tests.
# WireMock binds to port 8081 during tests, hence the adjusted endpoint.

dbmonitor.enabled=true
dbmonitor.appName=test-app
dbmonitor.environment=test

# WireMock stub server used in tests listens on port 8081
dbmonitor.collectorEndpoint=http://localhost:8081/api/events

# Faster flush cycle so tests do not have to wait 5 s
dbmonitor.reportingIntervalMs=500

# Lower threshold to exercise slow-query detection without long-running queries
dbmonitor.slowQueryThresholdMs=100

dbmonitor.sqlCapture=FULL
dbmonitor.maxQueueSize=1000
dbmonitor.retryAttempts=2
dbmonitor.retryDelayMs=500
